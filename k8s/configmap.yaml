# ============================================================
# ConfigMap – variables de entorno no sensibles
# ============================================================
# Aplicar:  kubectl apply -f k8s/configmap.yaml
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: article-generator-config
  labels:
    app: article-generator
data:
  OPENAI_MODEL: "gpt-4o"
  SITE: "https://tusitio.com"
  AUTHOR_USERNAME: "adminUser"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  FROM_EMAIL: "tu_correo@gmail.com"
  NOTIFY_EMAIL: "tu_correo@gmail.com"
  NOTIFY_VERBOSE: "true"
  SEND_PROMPT_EMAIL: "false"
  ARTICLE_LANGUAGE: "es"
  AI_TEMPERATURE_ARTICLE: "0.7"
  AI_TEMPERATURE_TITLE: "0.9"
