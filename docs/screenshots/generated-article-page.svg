<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" fill="none">
  <rect width="800" height="520" rx="12" fill="#ffffff"/>
  <rect x="0" y="0" width="800" height="56" rx="12" fill="#2563eb"/>
  <text x="40" y="36" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Mi Blog Técnico</text>
  <text x="700" y="36" font-family="sans-serif" font-size="14" fill="#dbeafe">Inicio | Blog | About</text>

  <text x="60" y="100" font-family="serif" font-size="28" font-weight="bold" fill="#1e293b">Cómo usar @Data en Lombok</text>
  <text x="60" y="125" font-family="sans-serif" font-size="13" fill="#64748b">📅 15 Jun 2025 · ⏱ 6 min lectura · 1240 palabras</text>
  <rect x="60" y="135" width="680" height="1" fill="#e2e8f0"/>

  <text x="60" y="165" font-family="sans-serif" font-size="14" fill="#334155">
    <tspan x="60" y="165" font-weight="bold" font-size="18" fill="#1e40af">¿Qué es @Data?</tspan>
    <tspan x="60" y="190">@Data es una anotación de Lombok que genera automáticamente</tspan>
    <tspan x="60" y="210">getters, setters, toString(), equals() y hashCode()…</tspan>
  </text>

  <rect x="60" y="230" width="680" height="80" rx="6" fill="#f1f5f9"/>
  <text x="80" font-family="monospace" font-size="13" fill="#334155">
    <tspan x="80" y="252" fill="#9333ea">@Data</tspan>
    <tspan x="80" y="270" fill="#2563eb">public class</tspan><tspan fill="#334155"> User {</tspan>
    <tspan x="100" y="288" fill="#2563eb">private</tspan><tspan fill="#334155"> String name;</tspan>
    <tspan x="80" y="306" fill="#334155">}</tspan>
  </text>

  <text x="60" y="345" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1e40af">❓ Preguntas frecuentes (FAQ)</text>
  <text x="60" font-family="sans-serif" font-size="14" fill="#334155">
    <tspan x="60" y="370" font-weight="bold">¿Qué métodos genera @Data?</tspan>
    <tspan x="60" y="390">Genera getters, setters, toString, equals y hashCode.</tspan>
    <tspan x="60" y="415" font-weight="bold">¿Puedo usar @Data con herencia?</tspan>
    <tspan x="60" y="435">Sí, pero se recomienda @EqualsAndHashCode(callSuper = true).</tspan>
  </text>

  <rect x="60" y="460" width="680" height="40" rx="6" fill="#eff6ff"/>
  <text x="80" y="485" font-family="sans-serif" font-size="13" fill="#3b82f6">🏷️ Tags: lombok · @data · java · spring boot · boilerplate</text>

  <text x="400" y="515" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">Reemplazar con captura real de la página del artículo</text>
</svg>
